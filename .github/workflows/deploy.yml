name: Deploy to dev server

on:
  push:
    branches:
      - main

jobs:
  deploy_job:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check PHP & Composer
        run: |
          php --version
          composer --version

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Test SSH Connection
        run: |
          sshpass -p "${{ secrets.DEV_PASS }}" ssh -o StrictHostKeyChecking=no ${{ secrets.DEV_USER }}@${{ secrets.DEV_SERVER }} "echo Connected && pwd && ls -la"

      - name: Deploy via rsync
        run: |
          sshpass -p "${{ secrets.DEV_PASS }}" rsync -rz \
          --no-perms --no-owner --no-group --omit-dir-times \
          --exclude='.git' \
          --exclude='__MACOSX' \
          --exclude='**/.DS_Store' \
          --exclude='storage/' \
          --exclude='vendor/' \
          --exclude='public/' \
          --exclude='.env' \
          -e "ssh -o StrictHostKeyChecking=no" \
          ./ ${{ secrets.DEV_USER }}@${{ secrets.DEV_SERVER }}:/var/www/html/healthcare
